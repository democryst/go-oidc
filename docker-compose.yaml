version: '3.8'

services:
  # The Post-Quantum OIDC Provider
  oidc-provider:
    build: .
    image: democryst/go-oidc:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_DSN=postgres://postgres:password@db:5432/postgres?sslmode=disable
      - REDIS_ADDR=redis:6379
      - OPENBAO_ADDR=http://openbao:8200
      - OPENBAO_TOKEN=root
      - ADMIN_API_KEY=dev-root-token
      - OIDC_ISSUER=http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      openbao:
        condition: service_started
    networks:
      - oidc-net

  # Database with Audit Trail
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oidc-net

  # Distributed Rate Limiter
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oidc-net

  # Post-Quantum KMS (OpenBao)
  openbao:
    image: openbao/openbao
    ports:
      - "8200:8200"
    environment:
      - BAO_DEV_ROOT_TOKEN_ID=root
    command: server -dev
    networks:
      - oidc-net

networks:
  oidc-net:
    driver: bridge
